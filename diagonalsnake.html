<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sak - l </title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #2c3e50; color: white; font-family: Arial, sans-serif; flex-direction: column; }
        canvas { border: 5px solid #ecf0f1; box-shadow: 0 0 20px rgba(0,0,0,0.5); background-color: #000; }
        h1 { margin-bottom: 10px; }
        #msg { color: #e74c3c; font-weight: bold; height: 20px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Score: <span id="score">0</span></h1>
    <div id="msg">Collect food to grow. (Game Created by dm34630-oss on Github.)</div>
    <canvas id="snakeGame" width="500" height="500"></canvas>
    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const msgElement = document.getElementById("msg");
        const box = 20;
        const gridW = canvas.width / box;
        const gridH = canvas.height / box;

        let score = 0;
        let snake = [{ x: 9 * box, y: 10 * box }];
        let food = { x: Math.floor(Math.random() * gridW) * box, y: Math.floor(Math.random() * gridH) * box };
        let dir = { x: 0, y: 0 };
        let keysPressed = {};
        let gameTick = 0;
        let bossMode = false;
        let bossHits = 0;
        let bossSnake = [];
        let bossDir = { x: 0, y: 0 };
        let allBossesDefeated = false;
        let chargeState = 0;
        let chargeTimer = 0;
        let swapTimer = 0;

        function getRandomBoss(excludeList) {
            let possible = [1, 2, 3, 4].filter(b => !excludeList.includes(b));
            if (possible.length === 0) return null;
            return possible[Math.floor(Math.random() * possible.length)];
        }

        let currentBossType = getRandomBoss([]);
        let checkpointState = { score: 0, snakeLength: 1, currentBossType: currentBossType, bossThreshold: 5, defeatedBosses: [] };

        document.addEventListener("keydown", (e) => {
            keysPressed[e.keyCode] = true;
            updatePlayerVelocity();
        });

        document.addEventListener("keyup", (e) => {
            delete keysPressed[e.keyCode];
            updatePlayerVelocity();
        });

        function updatePlayerVelocity() {
            let newX = 0;
            let newY = 0;
            if (keysPressed[37]) newX = -box;
            if (keysPressed[39]) newX = box;
            if (keysPressed[38]) newY = -box;
            if (keysPressed[40]) newY = box;

            if (newX !== 0 || newY !== 0) {
                if (snake.length > 1 && newX === -dir.x && newY === -dir.y) {
                    snake.reverse();
                    dir.x = newX;
                    dir.y = newY;
                } else {
                    dir.x = newX;
                    dir.y = newY;
                }
            }
        }

        function collision(head, array) {
            for(let i = 1; i < array.length; i++) {
                if(head.x === array[i].x && head.y === array[i].y) return true;
            }
            return false;
        }

        function updateBossDirection() {
            if (bossSnake.length === 0) return;
            let head = bossSnake[0];

            if (currentBossType === 1) {
                let playerHead = snake[0];
                let slipChance = Math.random();
                if (slipChance < 0.35) {
                    const moves = [{x: box, y: 0}, {x: -box, y: 0}, {x: 0, y: box}, {x: 0, y: -box}];
                    let randomMove = moves[Math.floor(Math.random() * moves.length)];
                    bossDir.x = randomMove.x; bossDir.y = randomMove.y;
                    return;
                }
                if (Math.abs(playerHead.x - head.x) > Math.abs(playerHead.y - head.y)) {
                    bossDir.x = head.x < playerHead.x ? box : -box;
                    bossDir.y = 0;
                } else {
                    bossDir.y = head.y < playerHead.y ? box : -box;
                    bossDir.x = 0;
                }
            } else if (currentBossType === 2) {
                if (bossDir.x === 0 && bossDir.y === 0) bossDir = { x: box, y: box };
                let nextX = head.x + bossDir.x;
                let nextY = head.y + bossDir.y;
                if (nextX < 0 || nextX >= canvas.width) bossDir.x *= -1;
                if (nextY < 0 || nextY >= canvas.height) bossDir.y *= -1;
            } else if (currentBossType === 3) {
                if (chargeState === 0) {
                    bossDir.x = dir.x;
                    bossDir.y = dir.y;
                    if (Math.random() < 0.05) { chargeState = 1; chargeTimer = 10; }
                } else if (chargeState === 1) {
                    bossDir.x = 0; bossDir.y = 0;
                    chargeTimer--;
                    if (chargeTimer <= 0) {
                        chargeState = 2;
                        let playerHead = snake[0];
                        bossDir.x = head.x < playerHead.x ? box : (head.x > playerHead.x ? -box : 0);
                        bossDir.y = head.y < playerHead.y ? box : (head.y > playerHead.y ? -box : 0);
                        chargeTimer = 8;
                    }
                } else if (chargeState === 2) {
                    chargeTimer--;
                    if (chargeTimer <= 0) chargeState = 0;
                }
            } else if (currentBossType === 4) {
                swapTimer++;
                if (swapTimer >= 40) {
                    swapTimer = 0;
                    let tempX = snake[0].x;
                    let tempY = snake[0].y;
                    snake[0].x = bossSnake[0].x;
                    snake[0].y = bossSnake[0].y;
                    bossSnake[0].x = tempX;
                    bossSnake[0].y = tempY;
                    msgElement.innerHTML = "Shift: Positions Swapped.";
                }
                if (gameTick % 5 === 0) {
                    bossDir.x = head.x < food.x ? box : (head.x > food.x ? -box : 0);
                    bossDir.y = head.y < food.y ? box : (head.y > food.y ? -box : 0);
                }
            }
        }

        function gameOver() {
            alert("awhh you failed :3 Score: " + score + "\n returning to last checkpoint!");
            score = checkpointState.score;
            currentBossType = checkpointState.currentBossType;
            allBossesDefeated = false;
            chargeState = 0;
            swapTimer = 0;
            scoreElement.innerHTML = score;
            snake = [{ x: 9 * box, y: 10 * box }];
            for(let i = 1; i < checkpointState.snakeLength; i++) {
                snake.push({ x: 9 * box, y: 10 * box });
            }
            dir = { x: 0, y: 0 };
            bossMode = false;
            bossSnake = [];
            bossHits = 0;
            msgElement.innerHTML = "Don't give up'! (Use Arrows for Diagonal)";
        }

        function draw() {
            gameTick++;
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#2ecc71" : "#27ae60";
                ctx.fillRect(snake[i].x, snake[i].y, box-1, box-1);
            }

            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(food.x, food.y, box-1, box-1);

            if (!bossMode && !allBossesDefeated && score >= checkpointState.bossThreshold) {
                bossMode = true;
                msgElement.innerHTML = "Boss time! Lure them into your tail.";
                if (currentBossType === 1) {
                    bossSnake = [{x: (gridW-6)*box, y: 1*box}, {x: (gridW-5)*box, y: 1*box}, {x: (gridW-4)*box, y: 1*box}, {x: (gridW-3)*box, y: 1*box}, {x: (gridW-2)*box, y: 1*box}, {x: (gridW-1)*box, y: 1*box}];
                } else if (currentBossType === 2) {
                    bossSnake = [{x: 0, y: 0}, {x: box, y: box}];
                    bossDir = {x: box, y: box};
                } else if (currentBossType === 3) {
                    bossSnake = [{x: (gridW-1)*box, y: (gridH-1)*box}, {x: (gridW-2)*box, y: (gridH-2)*box}];
                } else if (currentBossType === 4) {
                    bossSnake = [{x: 12*box, y: 12*box}, {x: 12*box, y: 12*box}];
                    msgElement.innerHTML = "In-Grid: Find the invisible snake!";
                }
            }

            if (bossMode && bossSnake.length > 0) {
                let showPing = (currentBossType === 4 && (gameTick % 30 < 5));
                for(let i = 0; i < bossSnake.length; i++) {
                    if (currentBossType === 1) ctx.fillStyle = (i == 0 ? "#9b59b6" : "#8e44ad");
                    else if (currentBossType === 2) ctx.fillStyle = (i == 0 ? "#f1c40f" : "#f39c12");
                    else if (currentBossType === 3) ctx.fillStyle = (i == 0 ? "#ff0000" : "#b30000");
                    else if (currentBossType === 4) ctx.fillStyle = (i == 0 ? "#050505" : "#020202");
                    
                    ctx.fillRect(bossSnake[i].x, bossSnake[i].y, box-1, box-1);
                    if (showPing) {
                        ctx.strokeStyle = "white";
                        ctx.lineWidth = 1;
                        ctx.strokeRect(bossSnake[i].x, bossSnake[i].y, box-1, box-1);
                    }
                }

                let movementSpeed = (currentBossType === 1) ? 3 : (currentBossType === 3 && chargeState === 2 ? 1 : 2);
                if (gameTick % movementSpeed === 0) {
                    updateBossDirection();
                    let bHead = { x: bossSnake[0].x + bossDir.x, y: bossSnake[0].y + bossDir.y };

                    if(bHead.x < 0) bHead.x = 0;
                    if(bHead.x >= canvas.width) bHead.x = canvas.width - box;
                    if(bHead.y < 0) bHead.y = 0;
                    if(bHead.y >= canvas.height) bHead.y = canvas.height - box;

                    if(bHead.x === snake[0].x && bHead.y === snake[0].y) {
                        gameOver();
                        return;
                    }

                    let hitTail = false;
                    for(let i = 1; i < snake.length; i++) {
                        if(bHead.x === snake[i].x && bHead.y === snake[i].y) {
                            hitTail = true;
                            if (currentBossType === 2 && Math.random() < 0.75) {
                                bHead.x = Math.floor(Math.random() * gridW) * box;
                                bHead.y = Math.floor(Math.random() * gridH) * box;
                                msgElement.innerHTML = "Diagolden teleported!";
                            } else {
                                bossHits++;
                                let hitsNeeded = (currentBossType === 1) ? 1 : (currentBossType === 2 ? 2 : (currentBossType === 4 ? 4 : 3));
                                msgElement.innerHTML = "Direct Block! " + (hitsNeeded - bossHits) + " more hits needed to defeat Apple.";
                                bHead = {x: (bossHits % 2 === 0 ? 0 : (gridW-1)*box), y: (currentBossType === 2 ? (gridH-1)*box : 0)};
                                
                                if (bossHits >= hitsNeeded) {
                                    score += 50;
                                    scoreElement.innerHTML = score;
                                    bossHits = 0;
                                    bossMode = false;
                                    bossSnake = [];
                                    checkpointState.defeatedBosses.push(currentBossType);
                                    let nextBoss = getRandomBoss(checkpointState.defeatedBosses);
                                    if (nextBoss === null) {
                                        allBossesDefeated = true;
                                        msgElement.innerHTML = "All bosses are vanquished.";
                                    } else {
                                        currentBossType = nextBoss;
                                        msgElement.innerHTML = "YIPPEEEEEE!!!";
                                    }
                                    checkpointState.score = score;
                                    checkpointState.snakeLength = snake.length;
                                    checkpointState.currentBossType = currentBossType;
                                    checkpointState.bossThreshold = score + 5;
                                }
                            }
                            break;
                        }
                    }
                    if (bossSnake.length > 0) {
                        bossSnake.pop();
                        bossSnake.unshift(bHead);
                    }
                }
            }

            if (dir.x !== 0 || dir.y !== 0) {
                let newHead = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

                if(newHead.x < 0 || newHead.x >= canvas.width || newHead.y < 0 || newHead.y >= canvas.height || collision(newHead, snake)) {
                    gameOver();
                    return;
                }

                if (bossMode && bossSnake.length > 0) {
                    for(let b of bossSnake) {
                        if (newHead.x === b.x && newHead.y === b.y) {
                            gameOver();
                            return;
                        }
                    }
                }

                if(newHead.x === food.x && newHead.y === food.y) {
                    score++;
                    scoreElement.innerHTML = score;
                    food = { x: Math.floor(Math.random() * gridW) * box, y: Math.floor(Math.random() * gridH) * box };
                } else {
                    snake.pop();
                }
                snake.unshift(newHead);
            }
        }

        let game = setInterval(draw, 100);
    </script>
</body>
</html>
